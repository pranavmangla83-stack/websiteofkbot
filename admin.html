<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Operations | Custom AI Chatbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >
  <style>
    body { font-family: "DM Sans", sans-serif; background: #f8fafc; color: #111827; }
    h1, h2 { font-family: "Space Grotesk", sans-serif; }
  </style>
</head>
<body class="min-h-screen" data-protected-page data-admin-page>
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4">
      <a href="/" class="font-bold">Custom AI Chatbot</a>
      <nav class="flex items-center gap-3 text-sm">
        <span data-user-email class="hidden text-slate-600 sm:inline" data-auth-user></span>
        <a href="/dashboard.html" class="rounded-lg border border-slate-200 px-4 py-2 font-bold">Dashboard</a>
        <a href="/" data-kinde-logout class="rounded-lg bg-slate-950 px-4 py-2 font-bold text-white">Logout</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-5 py-8">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <p class="text-sm font-bold uppercase tracking-wide text-[#8e4427]">Founder operations</p>
        <h1 class="mt-2 text-3xl font-bold">Launch admin visibility</h1>
      </div>
      <button type="button" data-admin-refresh class="rounded-lg bg-[#c96f4a] px-5 py-3 text-sm font-bold text-white">
        Refresh
      </button>
    </div>

    <p class="mt-4 rounded-lg border border-slate-200 bg-white p-4 text-sm text-slate-700" data-admin-status>
      Loading admin data...
    </p>

    <section class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-5" data-admin-summary></section>

    <section class="mt-8 grid gap-6">
      <div data-admin-table="leads"></div>
      <div data-admin-table="subscriptions"></div>
      <div data-admin-table="documents"></div>
      <div data-admin-table="usage"></div>
      <div data-admin-table="users"></div>
    </section>
  </main>

  <script type="module" src="/assets/js/auth.js"></script>
</body>
</html>
